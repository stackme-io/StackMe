<!--
  Favicon = the optical-size version of the LogoMark. The header mark is a 9x15 grid;
  at 16px those cells fall below one device pixel and the whole thing mushes into a blob,
  so the favicon redraws the same S on a coarse 5x5 grid. Silhouette and block language
  match, cell size survives. Background is lighter than the old #111111 so the rounded
  square does not disappear into a dark browser chrome.
  Monochrome on purpose: cyan/violet/orange belong to the tools, the hub stays neutral.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 84 84" width="32" height="32">
  <rect width="84" height="84" rx="10" fill="#1A1D22"/>
  <g fill="#ffffff">
    <!-- row 0 -->
    <rect x="13" y="13" width="11" height="11" rx="2"/><rect x="26" y="13" width="11" height="11" rx="2"/><rect x="39" y="13" width="11" height="11" rx="2"/><rect x="52" y="13" width="11" height="11" rx="2"/><rect x="65" y="13" width="11" height="11" rx="2"/>
    <!-- row 1 -->
    <rect x="13" y="26" width="11" height="11" rx="2"/>
    <!-- row 2 -->
    <rect x="13" y="39" width="11" height="11" rx="2"/><rect x="26" y="39" width="11" height="11" rx="2"/><rect x="39" y="39" width="11" height="11" rx="2"/><rect x="52" y="39" width="11" height="11" rx="2"/><rect x="65" y="39" width="11" height="11" rx="2"/>
    <!-- row 3 -->
    <rect x="65" y="52" width="11" height="11" rx="2"/>
    <!-- row 4 -->
    <rect x="13" y="65" width="11" height="11" rx="2"/><rect x="26" y="65" width="11" height="11" rx="2"/><rect x="39" y="65" width="11" height="11" rx="2"/><rect x="52" y="65" width="11" height="11" rx="2"/><rect x="65" y="65" width="11" height="11" rx="2"/>
  </g>
</svg>
